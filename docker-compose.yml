version: '3.8'
services:
  auth-db:
    image: postgres:16.4-alpine
    container_name: auth-db
    env_file:
      - /apps/user-service/.env
    ports:
      - '5432:5432'
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - tasker-network

networks:
  tasker-network:
    driver: bridge

volumes:
  auth-db-data:
